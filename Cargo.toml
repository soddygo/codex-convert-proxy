[package]
name = "codex-convert-proxy"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web framework / proxy
pingora = { version = "0.8", features = ["lb"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Error handling
thiserror = "1.0"

# Utilities
uuid = { version = "1.0", features = ["v4"] }
async-trait = "0.1"
chrono = "0.4"
http = "1"
bytes = "1"

[dev-dependencies]
tokio-test = "0.4"

[[example]]
name = "proxy_server"
path = "examples/proxy_server.rs"
